name: fashohah
description: "Islamic Super App - Qur'an, Prayer, Zikir, and more."
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Audio — flutter_soloud: SoLoud engine, zero external DLLs, works everywhere
  flutter_soloud: ^3.2.1

  # Networking
  dio: ^5.7.0

  # Local Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0          # Local DB untuk prayer times

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  flutter_compass: ^0.8.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0

  # Ads
  google_mobile_ads: ^5.3.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Routing
  go_router: ^14.6.3

  # Utils
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/dzikir.json
    - assets/png/dome.png
    - assets/png/nomor-frame-arab.png
